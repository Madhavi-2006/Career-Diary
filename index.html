<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>करिअर कट्टा - करिअर डायरी</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Noto Sans Devanagari',sans-serif;
}

/* BODY (ONLY FIX ADDED) */
body{
    min-height:100vh;
    padding:20px;
}

/* COVER PAGE (FIXED ONLY) */
.cover-page{
    width:100%;
    max-width:950px;
    margin:auto;

    background:white;
    border-radius:25px;
    padding:40px;

    box-shadow:0 15px 40px rgba(0,0,0,.25);

    border-top:10px solid #f59e0b;
    border-bottom:10px solid #ef4444;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
}

/* LOGO */
.logo-box{
    width:140px;
    height:140px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#fff;
    border-radius:50%;

    box-shadow:0 4px 15px rgba(0,0,0,.15);
}

.logo-box img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* TEXT */
.heading{
    flex:1;
    text-align:center;
}

.heading h2{
    color:#6A1B9A;
    font-size:30px;
    font-weight:800;
    line-height:1.4;
}

.heading p{
    color:#8e24aa;
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

/* MAIN TITLE */
.career-katta{
    text-align:center;
    margin-top:30px;
    font-size:90px;
    color:#d50000;
    font-weight:900;
    text-shadow:3px 3px #fff, 6px 6px 10px rgba(0,0,0,.25);
}

.tagline{
    text-align:center;
    margin-top:8px;
    font-size:28px;
    color:#1e3a8a;
    font-weight:bold;
}

.diary{
    text-align:center;
    margin-top:15px;
    font-size:75px;
    color:#c2185b;
    font-weight:900;
    text-shadow:3px 3px #fff, 6px 6px 10px rgba(0,0,0,.25);
}

.book{
    text-align:center;
    font-size:90px;
    margin:10px 0 20px;
}

/* FORM */
.form-box{
    width:85%;
    margin:auto;

    background:#f8fafc;
    border-radius:20px;
    padding:25px;

    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:700;
}

.input-group input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

/* BUTTON */
.next-btn{
    display:block;
    margin:25px auto;
    padding:15px 40px;

    border:none;
    border-radius:50px;

    font-size:20px;
    font-weight:bold;
    color:white;

    cursor:pointer;

    background:linear-gradient(135deg,#ef4444,#f97316);
}

.next-btn:hover{
    transform:scale(1.05);
    transition:.3s;
}

/* FOOTER */
.footer{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:#555;
}

/* 🔥 ONLY MOBILE FIX (NO DESIGN CHANGE) */
@media (max-width:768px){

    .cover-page{
        padding:20px;
    }

    .header{
        flex-direction:column;
    }

    .logo-box{
        width:90px;
        height:90px;
    }

    .heading h2{
        font-size:18px;
    }

    .heading p{
        font-size:14px;
    }
}

</style>
</head>

<body>

<div class="cover-page">

    <div class="header">

        <div class="logo-box">
            <img src="./Seal_of_Maharashtra.png">
        </div>

        <div class="heading">

            <h2>महाराष्ट्र राज्य उच्च व तंत्र शिक्षण विभाग</h2>
            <h2>आणि महाराष्ट्र माहिती तंत्रज्ञान सहाय्यता केंद्र</h2>

            <p>यांच्या संयुक्त विद्यमाने</p>

        </div>

        <div class="logo-box">
            <img src="./images.png">
        </div>

    </div>

    <div class="career-katta">करिअर कट्टा</div>
    <div class="tagline">युवकांच्या सर्वांगीण विकासासाठी...</div>
    <div class="diary">करिअर डायरी</div>

    <div class="book">📖</div>

    <div class="form-box">

        <div class="input-group">
            <label>महाविद्यालयाचे नाव</label>
            <input type="text">
        </div>

        <div class="input-group">
            <label>प्राचार्यांचे नाव</label>
            <input type="text">
        </div>

        <div class="input-group">
            <label>महाविद्यालयीन समन्वयकाचे नाव</label>
            <input type="text">
        </div>

        <div class="input-group">
            <label>विद्यार्थ्याचे नाव</label>
            <input type="text">
        </div>

        <div class="input-group">
            <label>संपर्क क्रमांक</label>
            <input type="tel" maxlength="10"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        </div>

    </div>

    <button class="next-btn" onclick="goToPage2()">Next →</button>

    <div class="footer">
        Academic Year 2026 - 27
    </div>

</div>

<script>
function goToPage2(){
    window.location.href="./page2.html";
}
</script>

</body>
</html>
